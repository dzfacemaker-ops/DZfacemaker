<div class="request-box">

<!-- صندوق رسائل الأدمن المخفي السحابي -->
<div id="admin-inbox" style="display: none; margin-top: 20px; padding: 15px; background: #1a1a1a; border: 2px dashed #00e676; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    <h3 style="color: #00e676; text-align: center; font-size: 1.05rem; margin-bottom: 12px; font-weight: 600;"><i class="fas fa-envelope-open-text"></i> Admin's Inbox 📬</h3>
    <ul id="requests-list" style="list-style: none; padding: 0; margin-top: 10px; text-align: left;">
        <!-- الرسائل القادمة من السيرفر تظهر هنا -->
    </ul>
    <button id="clear-requests-btn" style="background: #ff1744; color: white; width: 100%; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 12px; font-weight: bold; font-size: 0.9rem; transition: background 0.3s;">Delete all messages</button>
</div>

<script>
    // الرابط الصحيح والحروف صغيرة كامل كيما في شاشة كمبيوترك
    const FIREBASE_URL = "https://dzfacemaker-requests-default-rtdb.firebaseio.com/requests.json";

    // 1. دالة إرسال الطلب (Submit)
    document.getElementById('submit-request-btn').addEventListener('click', function() {
        const input = document.getElementById('player-input');
        const playerName = input.value.trim();

        if (playerName === "") {
            alert("Please write a player's name first!");
            return;
        }

        const requestData = {
            name: playerName,
            date: new Date().toLocaleDateString('en-US')
        };

        // إرسال البيانات بـ POST للسيرفر
        fetch(FIREBASE_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(requestData)
        })
        .then(res => {
            if (res.ok) {
                alert("The request was successfully submitted! 🚀");
                input.value = "";
                updateAdminInboxUI(); // تحديث القائمة فوراً
            } else {
                alert("Server connection error.");
            }
        })
        .catch(err => console.error("Error sending:", err));
    });

    // 2. دالة جلب وقراءة الطلبات وعرضها في صندوق الأدمن
    function updateAdminInboxUI() {
        const list = document.getElementById('requests-list');
        if (!list) return;
        
        list.innerHTML = "";

        fetch(FIREBASE_URL)
        .then(res => res.json())
        .then(data => {
            if (!data) {
                list.innerHTML = "<li style='color: #888; text-align: center; padding: 10px;'>No new requests.</li>";
                return;
            }

            // عرض البيانات لايف
            Object.keys(data).forEach(key => {
                const req = data[key];
                const li = document.createElement('li');
                li.style.background = "#121212";
                li.style.padding = "10px 12px";
                li.style.marginBottom = "8px";
                li.style.borderRadius = "6px";
                li.style.borderLeft = "4px solid #00e676";
                li.style.color = "#fff";
                li.style.display = "flex";
                li.style.justifyContent = "space-between";
                li.innerHTML = `<strong>${req.name}</strong> <span style="font-size: 0.75rem; color: #888;">${req.date}</span>`;
                list.appendChild(li);
            });
        })
        .catch(err => console.error("Error reading:", err));
    }

    // 3. دالة مسح كل الرسائل
    document.getElementById('clear-requests-btn').addEventListener('click', function() {
        if (confirm("Are you sure you've deleted all the orders?")) {
            fetch(FIREBASE_URL, { method: "DELETE" })
            .then(() => updateAdminInboxUI())
            .catch(err => console.error("Error deleting:", err));
        }
    });

    // 4. ميزة الـ 5 ضغطات السرية لفتح الصندوق
    let secretClickCount = 0;
    const trigger = document.querySelector('.admin-trigger');
    if (trigger) {
        trigger.addEventListener('click', function() {
            secretClickCount++;
            if (secretClickCount === 5) {
                const inbox = document.getElementById('admin-inbox');
                if (inbox) {
                    inbox.style.display = inbox.style.display === 'none' ? 'block' : 'none';
                    updateAdminInboxUI(); // جلب الطلبات عند الفتح
                }
                secretClickCount = 0;
            }
        });
    }
</script>




<script>
    // هاد الكود الصغير يضمن أن الزر يخدم حتى لو صرى مشكل في الملف الخارجي
    document.getElementById('submit-request-btn').addEventListener('click', () => {
        if (typeof sendPlayerRequest === 'function') {
            sendPlayerRequest();
        } else {
            // إذا لم يجد الدالة في script.js، يطبقها هنا مباشرة
            const input = document.getElementById('player-input');
            const playerName = input.value.trim();

            if (playerName === "") {
                alert("Done!");
                return;
            }

            let savedRequests = JSON.parse(localStorage.getItem('pes_requests')) || [];
            savedRequests.push({
                name: playerName,
                date: new Date().toLocaleDateString('ar-DZ')
            });

            localStorage.setItem('pes_requests', JSON.stringify(savedRequests));
            alert("Your request has been sent successfully!");
            input.value = "";
            
            if (typeof updateAdminInbox === 'function') {
                updateAdminInbox();
            }
        }
    });
</script>
